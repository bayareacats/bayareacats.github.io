name: Update adoption count

on:
  workflow_dispatch:
  schedule:
    - cron: "17 10 * * *"

permissions:
  contents: write

jobs:
  update-adoption-count:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update adoption count from Shelterluv
        env:
          SHELTERLUV_API_KEY: ${{ secrets.SHELTERLUV_API_KEY }}
          SHELTERLUV_ADOPTION_COUNT_OFFSET: ${{ vars.SHELTERLUV_ADOPTION_COUNT_OFFSET }}
        run: node scripts/update-adoption-count.mjs

      - name: Commit count update
        run: |
          if git diff --quiet -- _data/impact.yml; then
            echo "Adoption count is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/impact.yml
          git commit -m "Update adoption count"
          git push
