name: Update impact stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-impact-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Check API tokens
        id: token
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          SHELTERLUV_API_KEY: ${{ secrets.SHELTERLUV_API_KEY }}
        run: |
          if [ -z "$AIRTABLE_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "AIRTABLE_TOKEN is not configured; skipping."
          elif [ -z "$SHELTERLUV_API_KEY" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "SHELTERLUV_API_KEY is not configured; skipping."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.token.outputs.configured == 'true'

      - uses: actions/setup-node@v4
        if: steps.token.outputs.configured == 'true'
        with:
          node-version: "24"

      - name: Update impact stats
        if: steps.token.outputs.configured == 'true'
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          SHELTERLUV_API_KEY: ${{ secrets.SHELTERLUV_API_KEY }}
        run: node scripts/update-impact-stats.mjs

      - name: Commit updated stats
        if: steps.token.outputs.configured == 'true'
        run: |
          if git diff --quiet -- _data/impact_stats.json; then
            echo "No impact stat changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/impact_stats.json
          git commit -m "Update impact stats"
          git push
